name: Build

on:
  workflow_dispatch:
  pull_request:
  push:

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: Etc/UTC

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: "22.04"
            board: "jetson-nano"
            revision: "300"
            l4t_version: "32"
            l4t_bsp: "32.7.4"

          - ubuntu: "22.04"
            board: "jetson-nano"
            revision: "200"
            l4t_version: "32"
            l4t_bsp: "32.7.4"

          - ubuntu: "22.04"
            board: "jetson-nano"
            revision: "100"
            l4t_version: "32"
            l4t_bsp: "32.7.4"

          - ubuntu: "22.04"
            board: "jetson-nano-2gb"
            l4t_version: "32"
            l4t_bsp: "32.7.4"

          - ubuntu: "24.04"
            board: "jetson-orin-nano"
            device: "SD"
            l4t_version: "36"
            l4t_bsp: "36.3.0"

          - ubuntu: "24.04"
            board: "jetson-orin-nano"
            device: "USB"
            l4t_version: "36"
            l4t_bsp: "36.3.0"

          - ubuntu: "22.04"
            board: "jetson-agx-xavier"
            device: "SD"
            l4t_version: "35"
            l4t_bsp: "35.5.0"

          - ubuntu: "22.04"
            board: "jetson-agx-xavier"
            device: "USB"
            l4t_version: "35"
            l4t_bsp: "35.5.0"

          - ubuntu: "22.04"
            board: "jetson-xavier-nx"
            device: "SD"
            l4t_version: "35"
            l4t_bsp: "35.5.0"

          - ubuntu: "22.04"
            board: "jetson-xavier-nx"
            device: "USB"
            l4t_version: "35"
            l4t_bsp: "35.5.0"

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@just

      - name: Configure timezone
        run: |
          sudo ln -fs /usr/share/zoneinfo/$TZ /etc/localtime
          echo $TZ | sudo tee /etc/timezone
          sudo dpkg-reconfigure --frontend noninteractive tzdata

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y podman qemu-user-static pigz tzdata
          sudo systemctl start systemd-binfmt.service

      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Create rootfs
        run: |
          just build-jetson-rootfs ${{ matrix.ubuntu }}

      - name: Build image
        run: |
          # 1. Logic for naming within the shell session
          NAME="${{ matrix.board }}"
          [[ -n "${{ matrix.revision }}" ]] && NAME="${NAME}-${{ matrix.revision }}"
          [[ -n "${{ matrix.device }}" ]] && NAME="${NAME}_${{ matrix.device }}"
          FULL_NAME="${NAME}-${{ matrix.ubuntu }}-${{ matrix.l4t_bsp }}"

          # 2. Run the build command
          just build-jetson-image \
            -b ${{ matrix.board }} \
            ${{ matrix.revision && format('-r {0}', matrix.revision) || '' }} \
            ${{ matrix.device && format('-d {0}', matrix.device) || '' }} \
            ${{ matrix.l4t_version && format('-l {0}', matrix.l4t_version) || '' }}

          # 3. Rename and compress
          mv jetson.img "${FULL_NAME}.img"
          pigz "${FULL_NAME}.img"
          
          # 4. Export to GITHUB_ENV for SUBSEQUENT steps
          echo "IMAGE_FILE=${FULL_NAME}.img.gz" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${FULL_NAME}" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.IMAGE_FILE }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.IMAGE_FILE }}
