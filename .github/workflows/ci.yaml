name: Build

on:
  workflow_dispatch:
  pull_request:
  push:

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: Etc/UTC
  # Anchors defined here to be used in matrix below
  L4T32_BSP: &L4T32 "32.7.4"
  L4T35_BSP: &L4T35 "35.5.0"
  L4T36_BSP: &L4T36 "36.3.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: "22.04"
            board: "jetson-nano"
            revision: "300"
            l4t_version: "32"
            l4t_bsp: *L4T32
          - ubuntu: "22.04"
            board: "jetson-nano"
            revision: "200"
            l4t_version: "32"
            l4t_bsp: *L4T32
          - ubuntu: "22.04"
            board: "jetson-nano"
            revision: "100"
            l4t_version: "32"
            l4t_bsp: *L4T32
          - ubuntu: "22.04"
            board: "jetson-nano-2gb"
            l4t_version: "32"
            l4t_bsp: *L4T32
          - ubuntu: "24.04"
            board: "jetson-orin-nano"
            device: "SD"
            l4t_version: "36"
            l4t_bsp: *L4T36
          - ubuntu: "24.04"
            board: "jetson-orin-nano"
            device: "USB"
            l4t_version: "36"
            l4t_bsp: *L4T36
          - ubuntu: "22.04"
            board: "jetson-agx-xavier"
            device: "SD"
            l4t_version: "35"
            l4t_bsp: *L4T35
          - ubuntu: "22.04"
            board: "jetson-agx-xavier"
            device: "USB"
            l4t_version: "35"
            l4t_bsp: *L4T35
          - ubuntu: "22.04"
            board: "jetson-xavier-nx"
            device: "SD"
            l4t_version: "35"
            l4t_bsp: *L4T35
          - ubuntu: "22.04"
            board: "jetson-xavier-nx"
            device: "USB"
            l4t_version: "35"
            l4t_bsp: *L4T35

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@just

      - name: Configure timezone
        run: |
          sudo ln -fs /usr/share/zoneinfo/$TZ /etc/localtime
          echo "$TZ" | sudo tee /etc/timezone
          sudo dpkg-reconfigure --frontend noninteractive tzdata

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman qemu-user-static pigz tzdata
          sudo systemctl start systemd-binfmt.service

      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true
      
      - name: Create rootfs
        run: |
          # Force noninteractive inside the build script environment
          DEBIAN_FRONTEND=noninteractive just build-jetson-rootfs 22.04

      - name: Build image
        run: |
          BOARD="jetson-nano"
          REVISION="300"
          UBUNTU="22.04"
          BSP="32.7.4"
          L4T_VER="32"
          FULL_NAME="${BOARD}-${REVISION}-${UBUNTU}-${BSP}"

          # Force noninteractive inside the build script environment
          DEBIAN_FRONTEND=noninteractive just build-jetson-image \
            -b "$BOARD" \
            -r "$REVISION" \
            -l "$L4T_VER"

          mv jetson.img "${FULL_NAME}.img"
          pigz "${FULL_NAME}.img"
          
          echo "IMAGE_FILE=${FULL_NAME}.img.gz" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${FULL_NAME}" >> $GITHUB_ENV


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.IMAGE_FILE }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.IMAGE_FILE }}
